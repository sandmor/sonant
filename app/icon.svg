<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    /* Light Theme (Default) */
    .color-primary {
      /* --primary */
      fill: oklch(0.55 0.14 55);
      stroke: oklch(0.55 0.14 55);
    }
    .color-glow {
      /* --amber-glow */
      fill: oklch(0.85 0.14 65);
    }

    /* Dark Theme Override */
    @media (prefers-color-scheme: dark) {
      .color-primary {
        /* --dark-primary */
        fill: oklch(0.78 0.14 62);
        stroke: oklch(0.78 0.14 62);
      }
      .color-glow {
        /* --dark-amber-glow */
        fill: oklch(0.78 0.16 65);
      }
    }

    /* Shape Base Styles */
    .ring {
      fill: none;
      stroke-width: 6;
    }
    .bar {
      stroke: none;
    }
  </style>

  <circle class="ring color-primary" cx="50" cy="50" r="40"/>

  <rect class="bar color-primary" x="25" y="40" width="8" height="20" rx="4"/>
  <rect class="bar color-primary" x="39" y="25" width="8" height="50" rx="4"/>

  <rect class="bar color-glow" x="53" y="15" width="8" height="70" rx="4"/>

  <rect class="bar color-primary" x="67" y="35" width="8" height="30" rx="4"/>
</svg>
